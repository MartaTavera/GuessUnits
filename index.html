<style>

  .questions-container { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  .card.answered-correct { border-color: #22c55e; }
  .card.answered-wrong { border-color: #ef4444; }
  .card-num { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #67e8f9; margin-bottom: 0.5rem; }
  .question-text { font-size: 1.05rem; font-weight: 600; color: #1e293b; line-height: 1.5; margin-bottom: 0.75rem; }
  .diagram { display: flex; justify-content: center; margin: 0.75rem 0 1.25rem; background: #f8fafc; border-radius: 10px; padding: 1rem; }
  .diagram svg { max-width: 100%; height: auto; }
  .options { display: flex; flex-direction: column; gap: 0.65rem; }
  .option-btn { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 0.8rem 1rem; text-align: left; font-size: 0.95rem; color: #1e293b; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; line-height: 1.45; }
  .option-btn:hover:not(:disabled) { border-color: #06b6d4; background: #ecfeff; transform: translateX(3px); }
  .option-btn .unit { font-weight: 700; color: #0891b2; font-size: 1.1rem; min-width: 36px; display: inline-block; }
  .option-btn .meaning { color: #475569; }
  .option-btn.correct { border-color: #22c55e; background: #f0fdf4; }
  .option-btn.correct .unit { color: #16a34a; }
  .option-btn.wrong { border-color: #ef4444; background: #fef2f2; }
  .option-btn.wrong .unit { color: #dc2626; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 1rem; padding: 0.9rem 1rem; border-radius: 10px; font-size: 0.92rem; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  .feedback.wrong-fb { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .feedback strong { display: block; margin-bottom: 0.2rem; }
  .submit-row { max-width: 680px; margin: 1.5rem auto 0; }
  .submit-btn { width: 100%; padding: 1rem; background: #0891b2; color: #fff; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; opacity: 0.4; pointer-events: none; transition: background 0.15s, opacity 0.15s; }
  .submit-btn.ready { opacity: 1; pointer-events: all; }
  .submit-btn.ready:hover { background: #0e7490; }
  .score-card { max-width: 680px; margin: 1.5rem auto 2rem; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 2rem; text-align: center; display: none; }
  .score-card.show { display: block; }
  .score-emoji { font-size: 3.5rem; margin-bottom: 0.5rem; }
  .score-number { font-size: 3rem; font-weight: 800; color: #0891b2; }
  .score-label { font-size: 1rem; color: #475569; margin-bottom: 0.25rem; }
  .score-sub { font-size: 0.95rem; color: #64748b; margin-bottom: 1.5rem; }
  .retry-btn { padding: 0.85rem 2.5rem; background: #0891b2; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .retry-btn:hover { background: #0e7490; }
</style>
</head>
<body>

// ── Quiz Logic ────────────────────────────────────────────────────────────────

let answered = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  answered = new Array(questions.length).fill(false);
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('submitBtn').classList.remove('ready');
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  questions.forEach((q, qi) => {
    const opts = shuffle(q.options);
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${qi}`;

    const optsHtml = opts.map((opt, oi) =>
      `<button class="option-btn" id="opt-${qi}-${oi}">
        <span class="unit">${opt.unit}</span> <span class="meaning">${opt.meaning}</span>
      </button>`
    ).join('');

    card.innerHTML = `
      <div class="card-num">Question ${qi + 1} of ${questions.length}</div>

      <div class="question-text">${q.scenario}</div>
      <div class="diagram">${q.svg}</div>
      <div class="options" id="opts-${qi}">${optsHtml}</div>
      <div class="feedback" id="fb-${qi}"></div>
    `;
    container.appendChild(card);

    // Attach click handlers after insertion
    opts.forEach((opt, oi) => {
      document.getElementById(`opt-${qi}-${oi}`)
        .addEventListener('click', () => selectAnswer(qi, opt.correct, `opt-${qi}-${oi}`));
    });
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(qi, isCorrect, btnId) {
  if (answered[qi]) return;
  answered[qi] = true;

  const allBtns = document.querySelectorAll(`#opts-${qi} .option-btn`);
  allBtns.forEach(btn => {
    btn.disabled = true;
    const unitText = btn.querySelector('.unit').textContent.trim();
    const match = questions[qi].options.find(o => o.unit === unitText);
    if (match && match.correct) btn.classList.add('correct');
  });

  const clickedBtn = document.getElementById(btnId);
  if (!isCorrect) clickedBtn.classList.add('wrong');

  const card = document.getElementById(`card-${qi}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'} show`;
  fb.innerHTML = `<strong>${isCorrect ? '✅ Correct!' : '❌ Not quite.'}</strong>${questions[qi].explanation}`;

  if (answered.every(Boolean)) {
    const sb = document.getElementById('submitBtn');
    sb.classList.add('ready');
    sb.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function showScore() {
  const score = questions.reduce((acc, _, qi) =>
    acc + (document.getElementById(`card-${qi}`).classList.contains('answered-correct') ? 1 : 0), 0);

  const pct = Math.round((score / questions.length) * 100);
  let emoji, sub;
  if (pct === 100)    { emoji = '🏆'; sub = 'Perfect! You have an excellent sense of real-world measurements.'; }
  else if (pct >= 71) { emoji = '🎉'; sub = 'Great work! You have a solid feel for units and scale.'; }
  else if (pct >= 43) { emoji = '💪'; sub = 'Good effort! Read the explanations above and give it another go.'; }
  else                { emoji = '📚'; sub = 'Keep practising — the explanations above will help a lot!'; }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreNumber').textContent = `${score} / ${questions.length}`;
  document.getElementById('scoreSub').textContent = sub;

  const sc = document.getElementById('scoreCard');
  sc.classList.add('show');
  sc.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
